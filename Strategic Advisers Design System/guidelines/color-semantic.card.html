<!-- @dsCard group="Colors" viewport="700x150" name="Semantic & Status" subtitle="Meaning-carrying aliases: surfaces, text, and states" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);font-family:var(--font-body)}.wrap{display:flex;flex-wrap:wrap;gap:10px;padding:18px}
.chip{display:flex;align-items:center;gap:9px;border:1px solid var(--border-subtle);border-radius:var(--radius-pill);padding:6px 14px 6px 6px}
.dot{width:22px;height:22px;border-radius:50%}.lbl{font-size:12px;color:var(--text-body)}.mono{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}</style></head>
<body><div class="wrap">
<div class="chip"><span class="dot" style="background:var(--color-brand)"></span><span class="lbl">Brand<br><span class="mono">--color-brand</span></span></div>
<div class="chip"><span class="dot" style="background:var(--color-accent)"></span><span class="lbl">Accent<br><span class="mono">--color-accent</span></span></div>
<div class="chip"><span class="dot" style="background:var(--text-heading)"></span><span class="lbl">Heading<br><span class="mono">--text-heading</span></span></div>
<div class="chip"><span class="dot" style="background:var(--text-muted)"></span><span class="lbl">Muted<br><span class="mono">--text-muted</span></span></div>
<div class="chip"><span class="dot" style="background:var(--color-success)"></span><span class="lbl">Success<br><span class="mono">--color-success</span></span></div>
<div class="chip"><span class="dot" style="background:var(--color-warning)"></span><span class="lbl">Warning<br><span class="mono">--color-warning</span></span></div>
<div class="chip"><span class="dot" style="background:var(--color-error)"></span><span class="lbl">Error<br><span class="mono">--color-error</span></span></div>
<div class="chip"><span class="dot" style="background:var(--color-info)"></span><span class="lbl">Info<br><span class="mono">--color-info</span></span></div>
</div></body></html>
