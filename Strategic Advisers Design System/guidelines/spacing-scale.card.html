<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="4px base unit — the rhythm behind generous whitespace" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);padding:18px 22px;font-family:var(--font-mono)}
.row{display:flex;align-items:center;gap:12px;margin-bottom:7px}.bar{background:var(--navy-700);height:14px;border-radius:2px}
.lbl{font-size:11px;color:var(--text-muted);width:120px}</style></head>
<body>
<div class="row"><span class="lbl">--space-1 · 4</span><span class="bar" style="width:4px"></span></div>
<div class="row"><span class="lbl">--space-2 · 8</span><span class="bar" style="width:8px"></span></div>
<div class="row"><span class="lbl">--space-4 · 16</span><span class="bar" style="width:16px"></span></div>
<div class="row"><span class="lbl">--space-6 · 32</span><span class="bar" style="width:32px"></span></div>
<div class="row"><span class="lbl">--space-8 · 48</span><span class="bar" style="width:48px"></span></div>
<div class="row"><span class="lbl">--space-9 · 64</span><span class="bar" style="width:64px"></span></div>
<div class="row"><span class="lbl">--space-11 · 96</span><span class="bar" style="width:96px"></span></div>
</body></html>
