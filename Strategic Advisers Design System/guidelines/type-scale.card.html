<!-- @dsCard group="Type" viewport="700x260" name="Type Scale" subtitle="Display through caption, one specimen per step" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);padding:18px 22px}
.row{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--border-subtle);padding:7px 0}
.row:last-child{border-bottom:0}
.t{font-family:var(--font-display);color:var(--navy-900);font-weight:600;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-left:auto;white-space:nowrap}</style></head>
<body>
<div class="row"><span class="t" style="font-size:44px">Display XL</span><span class="m">--fs-display-xl</span></div>
<div class="row"><span class="t" style="font-size:34px">Display LG</span><span class="m">--fs-display-lg</span></div>
<div class="row"><span class="t" style="font-size:28px">Heading 1</span><span class="m">--fs-h1 / 40</span></div>
<div class="row"><span class="t" style="font-size:22px">Heading 2</span><span class="m">--fs-h2 / 32</span></div>
<div class="row"><span class="t" style="font-size:18px">Heading 3</span><span class="m">--fs-h3 / 24</span></div>
<div class="row"><span class="t" style="font-size:16px;font-family:var(--font-body);font-weight:400">Body — 16px / 1.6</span><span class="m">--fs-body</span></div>
<div class="row"><span class="t" style="font-size:13px;font-family:var(--font-mono);font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--red-700)">Eyebrow</span><span class="m">--fs-eyebrow</span></div>
</body></html>
