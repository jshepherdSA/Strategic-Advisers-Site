<!-- @dsCard group="Components" viewport="700x420" name="Cards — Service, Industry, Testimonial" subtitle="Service, industry and testimonial cards" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--surface-subtle);font-family:var(--font-body)}
#root{padding:26px}.grid{display:grid;grid-template-columns:1.2fr .8fr 1fr;gap:16px;align-items:stretch}</style></head>
<body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.446.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { ServiceCard, IndustryCard, TestimonialCard } = window.StrategicAdvisersDesignSystem_281076;
const Icon = ({name,size=26}) => { const ref=React.useRef(null); React.useEffect(()=>{ const n=ref.current; if(n&&window.lucide){ n.innerHTML=''; const i=document.createElement('i'); i.setAttribute('data-lucide',name); n.appendChild(i); window.lucide.createIcons({attrs:{width:size,height:size}}); } },[name,size]); return <span ref={ref} style={{display:'inline-flex'}}/>; };
function Demo(){return(
  <div className="grid">
    <ServiceCard icon={<Icon name="megaphone"/>} title="Public Relations" description="Earned media, media training and crisis-ready messaging that holds up under scrutiny." tags={["Media Relations","Crisis","Messaging"]} href="#" />
    <IndustryCard label="Energy & Utilities" count="12 CAMPAIGNS" image="https://images.unsplash.com/photo-1466611653911-95081537e5b7?w=600&q=80" href="#" />
    <TestimonialCard quote="They turned a difficult announcement into a moment of trust." name="Dana Whitfield" role="VP Communications" org="Meridian Energy" tone="navy" />
  </div>
);}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script></body></html>
