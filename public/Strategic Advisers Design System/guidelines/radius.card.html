<!-- @dsCard group="Spacing" viewport="700x160" name="Radius" subtitle="Restrained corners — premium, not bubbly" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);padding:20px;display:flex;gap:16px;align-items:flex-end;font-family:var(--font-mono)}
.b{width:88px;height:66px;background:var(--navy-50);border:2px solid var(--navy-700)}
.c{text-align:center}.l{font-size:10px;color:var(--text-muted);margin-top:8px}</style></head>
<body>
<div class="c"><div class="b" style="border-radius:var(--radius-sm)"></div><div class="l">sm · 4</div></div>
<div class="c"><div class="b" style="border-radius:var(--radius-md)"></div><div class="l">md · 8</div></div>
<div class="c"><div class="b" style="border-radius:var(--radius-lg)"></div><div class="l">lg · 12</div></div>
<div class="c"><div class="b" style="border-radius:var(--radius-xl)"></div><div class="l">xl · 18</div></div>
<div class="c"><div class="b" style="border-radius:var(--radius-pill);width:66px"></div><div class="l">pill</div></div>
</body></html>
