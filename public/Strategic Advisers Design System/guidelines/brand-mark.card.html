<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);display:flex;align-items:center;justify-content:space-around;height:200px;padding:20px}
.tile{display:flex;align-items:center;justify-content:center;width:130px;height:130px;border-radius:var(--radius-lg)}
img{width:96px;height:96px;object-fit:contain}</style></head>
<body>
<div class="tile" style="background:var(--surface-page);border:1px solid var(--border-subtle)"><img src="../assets/logos/sa-mark-color.png" alt="mark color"></div>
<div class="tile" style="background:var(--gray-50)"><img src="../assets/logos/sa-mark-dark.png" alt="mark dark"></div>
<div class="tile" style="background:linear-gradient(60deg, #587DD07F, #FFFFFF)"><img src="../assets/logos/sa-mark-color.png" alt="mark on navy"></div>
</body></html>
