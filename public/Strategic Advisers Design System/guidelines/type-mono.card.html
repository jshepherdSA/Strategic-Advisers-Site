<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);padding:20px 22px;font-family:var(--font-body)}
.eb{font-family:var(--font-mono);font-size:13px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--red-700)}
.stat{font-family:var(--font-mono);font-weight:600;font-size:40px;color:var(--navy-900);margin-top:10px;letter-spacing:-.01em}
.unit{font-size:18px;color:var(--gray-500)}
.tok{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-top:8px}</style></head>
<body>
<div class="eb">— Public Affairs</div>
<div class="stat">98<span class="unit">% earned reach</span> &nbsp; 24<span class="unit">/7 rapid response</span></div>
<div class="tok">--font-mono · --fs-eyebrow · --ls-eyebrow</div>
</body></html>
