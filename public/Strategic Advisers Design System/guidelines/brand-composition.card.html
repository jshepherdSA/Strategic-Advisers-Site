<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);display:flex;align-items:center;justify-content:center;height:220px;padding:20px}
.grid{display:grid;grid-template-columns:2fr 1fr 1.3fr;grid-template-rows:1fr 1fr;gap:12px;width:420px;height:170px}
.grid>div{overflow:hidden}
.mono{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;color:#fff;padding:8px}</style></head>
<body>
<div class="grid">
  <div style="grid-column:1;grid-row:1 / 3;background:var(--navy-700)"></div>
  <div style="grid-column:2;grid-row:1;background:var(--red-700)"></div>
  <div style="grid-column:2;grid-row:2;background:#fff"></div>
  <div style="grid-column:3;grid-row:1;background:#fff"></div>
  <div style="grid-column:3;grid-row:2;background:var(--navy-900)"></div>
</div>
</body></html>
