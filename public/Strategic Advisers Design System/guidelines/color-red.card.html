<!-- @dsCard group="Colors" viewport="700x130" name="Red Scale" subtitle="Accent family for CTAs and emphasis, 50–950" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);font-family:var(--font-mono)}.row{display:flex;padding:18px;gap:0}
.c{flex:1;height:82px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:10px}
.c:first-child{border-radius:var(--radius-md) 0 0 var(--radius-md)}.c:last-child{border-radius:0 var(--radius-md) var(--radius-md) 0}</style></head>
<body><div class="row">
<div class="c" style="background:var(--red-50);color:var(--red-800)">50</div>
<div class="c" style="background:var(--red-100);color:var(--red-800)">100</div>
<div class="c" style="background:var(--red-200);color:var(--red-800)">200</div>
<div class="c" style="background:var(--red-300);color:var(--red-900)">300</div>
<div class="c" style="background:var(--red-400);color:#fff">400</div>
<div class="c" style="background:var(--red-500);color:#fff">500</div>
<div class="c" style="background:var(--red-600);color:#fff">600</div>
<div class="c" style="background:var(--red-700);color:#fff">700</div>
<div class="c" style="background:var(--red-800);color:#fff">800</div>
<div class="c" style="background:var(--red-900);color:#fff">900</div>
<div class="c" style="background:var(--red-950);color:#fff">950</div>
</div></body></html>
