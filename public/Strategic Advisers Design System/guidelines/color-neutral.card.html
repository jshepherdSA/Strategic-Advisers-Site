<!-- @dsCard group="Colors" viewport="700x130" name="Neutral Scale" subtitle="Cool-leaning grays for text, borders and surfaces" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);font-family:var(--font-mono)}.row{display:flex;padding:18px;gap:0}
.c{flex:1;height:82px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:10px}
.c:first-child{border-radius:var(--radius-md) 0 0 var(--radius-md)}.c:last-child{border-radius:0 var(--radius-md) var(--radius-md) 0}</style></head>
<body><div class="row">
<div class="c" style="background:var(--gray-50);color:var(--gray-700);border:1px solid var(--border-subtle);border-right:0">50</div>
<div class="c" style="background:var(--gray-100);color:var(--gray-700)">100</div>
<div class="c" style="background:var(--gray-200);color:var(--gray-700)">200</div>
<div class="c" style="background:var(--gray-300);color:var(--gray-800)">300</div>
<div class="c" style="background:var(--gray-400);color:#fff">400</div>
<div class="c" style="background:var(--gray-500);color:#fff">500</div>
<div class="c" style="background:var(--gray-600);color:#fff">600</div>
<div class="c" style="background:var(--gray-700);color:#fff">700</div>
<div class="c" style="background:var(--gray-800);color:#fff">800</div>
<div class="c" style="background:var(--gray-900);color:#fff">900</div>
<div class="c" style="background:var(--gray-950);color:#fff">950</div>
</div></body></html>
