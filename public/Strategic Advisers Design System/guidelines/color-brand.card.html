<!-- @dsCard group="Colors" viewport="700x180" name="Brand Colors" subtitle="Navy authority + red energy — the two brand primaries" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);font-family:var(--font-body)}.wrap{display:flex;gap:14px;padding:18px}
.sw{flex:1;border-radius:var(--radius-lg);padding:16px;min-height:120px;display:flex;flex-direction:column;justify-content:flex-end;box-shadow:var(--shadow-sm)}
.nm{font-family:var(--font-display);font-weight:600;font-size:15px}.hex{font-family:var(--font-mono);font-size:12px;opacity:.8;margin-top:2px}
.tok{font-family:var(--font-mono);font-size:11px;opacity:.6;margin-top:1px}</style></head>
<body><div class="wrap">
<div class="sw" style="background:var(--navy-700);color:#fff"><div class="nm">Brand Navy</div><div class="hex">#1D2D51</div><div class="tok">--navy-700</div></div>
<div class="sw" style="background:var(--red-700);color:#fff"><div class="nm">Brand Red</div><div class="hex">#A42E2E</div><div class="tok">--red-700</div></div>
<div class="sw" style="background:var(--navy-900);color:#fff"><div class="nm">Ink</div><div class="hex">#101A35</div><div class="tok">--navy-900</div></div>
<div class="sw" style="background:var(--gray-50);color:var(--navy-900);border:1px solid var(--border-subtle)"><div class="nm">Paper</div><div class="hex">#F7F8FA</div><div class="tok">--gray-50</div></div>
</div></body></html>
