<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-subtle);padding:26px 20px;display:flex;gap:20px;align-items:center;font-family:var(--font-mono)}

<body>
<div class="b" style="box-shadow:var(--shadow-xs)">xs</div>

<div class="b" style="box-shadow:var(--shadow-lg)">lg</div>
