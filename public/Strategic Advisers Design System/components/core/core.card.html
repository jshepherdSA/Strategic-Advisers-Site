<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--surface-page);font-family:var(--font-body)}
#root{padding:26px}.grp{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:20px}
.sep{height:1px;background:var(--border-subtle);margin:20px 0}
.navy{background:var(--navy-700);padding:20px;border-radius:var(--radius-lg);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}</style></head>
<body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, Badge, Eyebrow, Stat } = window.StrategicAdvisersDesignSystem_281076;
function Demo(){return(<>
  <div className="lbl">Buttons</div>
  <div className="grp">
    <Button variant="primary">Start a conversation</Button>
    <Button variant="secondary">Our work</Button>
    <Button variant="outline">Services</Button>
    <Button variant="ghost">Read more</Button>
    <Button variant="primary" disabled>Disabled</Button>
    <Button variant="link">Inline link →</Button>
  </div>
  <div className="grp">
    <Button variant="primary" size="sm">Small</Button>
    <Button variant="primary" size="md">Medium</Button>
    <Button variant="primary" size="lg">Large</Button>
  </div>
  <div className="navy"><Button variant="on-navy">On navy</Button><Button variant="outline" style={{color:'#fff',borderColor:'rgba(255,255,255,0.4)'}}>Ghost</Button></div>
  <div className="sep"></div>
  <div className="lbl">Badges</div>
  <div className="grp">
    <Badge variant="accent">Public Affairs</Badge>
    <Badge variant="navy">Case Study</Badge>
    <Badge variant="neutral">Insight</Badge>
    <Badge variant="solid">Featured</Badge>
    <Badge variant="solid-accent">New</Badge>
    <Badge variant="success">Live</Badge>
  </div>
  <div className="sep"></div>
  <div className="grp" style={{gap:'48px'}}>
    <div><Eyebrow>What we do</Eyebrow></div>
    <Stat value="98%" label="Earned reach" sublabel="2024 campaigns" />
    <Stat value="24/7" label="Rapid response" />
    <Stat value="150+" label="Clients served" />
  </div>
</>);}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script></body></html>
